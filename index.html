<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Physics Simulation Explorer</title>
    <!-- Tailwind CSS를 통한 일관된 디자인 시스템 적용 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #f3f4f6; /* Tailwind gray-100 */
        }
        canvas {
            display: block;
            margin: 0 auto;
            background-color: #ffffff;
            border-radius: 0.5rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        /* 스크롤바 커스텀 */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #a8a8a8; }
    </style>
</head>
<body class="text-gray-800 h-screen flex flex-col">

    <!-- 네비게이션 바 -->
    <header class="bg-blue-600 text-white shadow-md">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-bold flex items-center cursor-pointer" onclick="showFrontpage()">
                <svg class="w-8 h-8 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"></path></svg>
                PhysicsSim
            </h1>
            <nav id="nav-menu" class="hidden">
                <button onclick="showFrontpage()" class="bg-blue-700 hover:bg-blue-800 px-4 py-2 rounded-md transition duration-300">
                    홈으로 돌아가기
                </button>
            </nav>
        </div>
    </header>

    <!-- 메인 콘텐츠 영역 -->
    <main class="flex-grow overflow-y-auto p-6" id="main-content">
        
        <!-- 프론트 페이지 (썸네일 리스트) -->
        <div id="frontpage" class="max-w-7xl mx-auto">
            <div class="text-center mb-10">
                <h2 class="text-4xl font-extrabold text-gray-900 mb-4">물리 법칙 시뮬레이션</h2>
                <p class="text-lg text-gray-600">교과서의 핵심 개념을 인터랙티브하게 학습해보세요.</p>
            </div>

            <!-- 시뮬레이션 카드 그리드 -->
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6" id="sim-grid">
                <!-- JS에서 동적으로 생성됨 -->
            </div>
        </div>

        <!-- 시뮬레이션 뷰 (단일 캔버스를 재사용) -->
        <div id="simulation-view" class="max-w-5xl mx-auto hidden flex-col items-center">
            <h2 id="sim-title" class="text-3xl font-bold text-gray-900 mb-2">시뮬레이션 제목</h2>
            <p id="sim-desc" class="text-gray-600 mb-6 text-center max-w-3xl">설명</p>
            
            <div class="flex flex-col md:flex-row w-full gap-6">
                <!-- 캔버스 영역 -->
                <div class="flex-grow bg-white p-4 rounded-xl shadow-md border border-gray-200">
                    <canvas id="sim-canvas" width="600" height="400" class="w-full h-auto bg-gray-50"></canvas>
                </div>
                
                <!-- 컨트롤 패널 -->
                <div class="w-full md:w-80 bg-white p-6 rounded-xl shadow-md border border-gray-200 flex flex-col gap-4">
                    <h3 class="text-xl font-bold text-gray-800 border-b pb-2">컨트롤 패널</h3>
                    <div id="controls-container" class="flex flex-col gap-4">
                        <!-- JS에서 동적 생성 -->
                    </div>
                    <div class="mt-auto pt-4 border-t flex justify-between">
                        <button id="btn-toggle" onclick="togglePlay()" class="bg-green-500 hover:bg-green-600 text-white px-4 py-2 rounded shadow transition">일시정지</button>
                        <button onclick="resetSimulation()" class="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded shadow transition">초기화</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-gray-800 text-gray-400 py-6 text-center">
        <p>&copy; 2026 Interactive Physics Simulation Project. All rights reserved.</p>
    </footer>

    <script>
        // --- 1. 데이터 정의 (8개의 시뮬레이션) ---
        const simulations = [
            {
                id: 'energy',
                title: '시스템 내 에너지 분석 (진자)',
                desc: '위치 에너지(PE)와 운동 에너지(KE)의 상호 변환을 관찰합니다.',
                color: 'bg-indigo-500'
            },
            {
                id: 'circuit',
                title: '전기 에너지의 흐름',
                desc: '전압, 전류, 저항의 관계(옴의 법칙)와 전구의 밝기를 확인합니다.',
                color: 'bg-yellow-500'
            },
            {
                id: 'electric_field',
                title: '전기장과 쿨롱의 법칙',
                desc: '두 전하 사이의 거리와 전하량에 따른 전기력의 크기를 시뮬레이션합니다.',
                color: 'bg-blue-500'
            },
            {
                id: 'momentum',
                title: '운동량과 충돌 (탄성/비탄성)',
                desc: '두 물체의 충돌 전후 운동량 보존의 법칙을 확인합니다.',
                color: 'bg-red-500'
            },
            {
                id: 'thermal',
                title: '열에너지의 변환 (분자 운동)',
                desc: '온도 변화에 따른 기체 분자의 운동 속도 변화를 관찰합니다.',
                color: 'bg-orange-500'
            },
            {
                id: 'gravity',
                title: '질량과 중력장 (위성 궤도)',
                desc: '행성과 위성 사이의 만유인력과 궤도 운동을 시뮬레이션합니다.',
                color: 'bg-purple-500'
            },
            {
                id: 'freefall',
                title: '중력장 내 자유 낙하',
                desc: '질량이 다른 두 물체가 중력장 내에서 동일하게 낙하하는 것을 봅니다.',
                color: 'bg-teal-500'
            },
            {
                id: 'impulse',
                title: '충격량과 에어백 효과',
                desc: '충돌 시간 변화(에어백 유무)가 충격력에 미치는 영향을 그래프로 봅니다.',
                color: 'bg-pink-500'
            }
        ];

        // --- 2. 상태 변수 ---
        let currentSim = null;
        let isPlaying = true;
        let animationId;
        const canvas = document.getElementById('sim-canvas');
        const ctx = canvas.getContext('2d');
        
        // 각 시뮬레이션별 상태 저장 객체
        let state = {};

        // --- 3. UI 렌더링 ---
        function initApp() {
            const grid = document.getElementById('sim-grid');
            simulations.forEach(sim => {
                const card = document.createElement('div');
                card.className = "bg-white rounded-xl shadow-md overflow-hidden hover:shadow-xl transition-shadow duration-300 flex flex-col h-full border border-gray-100";
                card.innerHTML = `
                    <div class="h-32 ${sim.color} flex items-center justify-center text-white relative">
                        <span class="text-4xl opacity-50 absolute inset-0 flex items-center justify-center">⚛️</span>
                        <h3 class="text-xl font-bold relative z-10 px-4 text-center text-shadow">${sim.title}</h3>
                    </div>
                    <div class="p-5 flex-grow flex flex-col justify-between">
                        <div>
                            <p class="text-gray-600 text-sm mb-3">${sim.desc}</p>
                        </div>
                        <button onclick="loadSimulation('${sim.id}')" class="mt-4 w-full bg-gray-800 hover:bg-black text-white font-semibold py-2 px-4 rounded transition">
                            시뮬레이션 시작
                        </button>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function showFrontpage() {
            cancelAnimationFrame(animationId);
            document.getElementById('frontpage').classList.remove('hidden');
            document.getElementById('simulation-view').classList.add('hidden');
            document.getElementById('nav-menu').classList.add('hidden');
        }

        function loadSimulation(id) {
            const sim = simulations.find(s => s.id === id);
            currentSim = id;
            isPlaying = true;
            document.getElementById('btn-toggle').innerText = "일시정지";
            
            document.getElementById('frontpage').classList.add('hidden');
            document.getElementById('simulation-view').classList.remove('hidden');
            document.getElementById('simulation-view').classList.add('flex');
            document.getElementById('nav-menu').classList.remove('hidden');
            
            document.getElementById('sim-title').innerText = sim.title;
            document.getElementById('sim-desc').innerText = sim.desc;
            
            setupControls(id);
            resetSimulation();
            animate();
        }

        // --- 4. 컨트롤 패널 동적 생성 ---
        function setupControls(id) {
            const container = document.getElementById('controls-container');
            container.innerHTML = ''; // 초기화
            
            const createSlider = (label, id, min, max, val, step, unit) => {
                return `
                    <div class="mb-2">
                        <label class="block text-sm font-medium text-gray-700 flex justify-between">
                            ${label} <span id="${id}-val" class="text-blue-600 font-bold">${val}${unit}</span>
                        </label>
                        <input type="range" id="${id}" min="${min}" max="${max}" value="${val}" step="${step}" 
                            class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer mt-1"
                            oninput="document.getElementById('${id}-val').innerText = this.value + '${unit}'; updateState();">
                    </div>
                `;
            };

            if (id === 'energy') {
                container.innerHTML = createSlider('초기 각도', 'angle', 10, 90, 45, 1, '°') +
                                      createSlider('줄의 길이', 'length', 100, 300, 200, 10, 'px');
            } else if (id === 'circuit') {
                container.innerHTML = createSlider('전압 (V)', 'voltage', 0, 20, 10, 1, 'V') +
                                      createSlider('저항 (R)', 'resistance', 1, 50, 10, 1, 'Ω');
            } else if (id === 'electric_field') {
                container.innerHTML = createSlider('전하량 1', 'q1', -10, 10, 5, 1, 'μC') +
                                      createSlider('전하량 2', 'q2', -10, 10, -5, 1, 'μC') +
                                      createSlider('거리', 'dist', 50, 400, 200, 10, 'px');
            } else if (id === 'momentum') {
                container.innerHTML = createSlider('물체 1 질량', 'm1', 1, 10, 5, 1, 'kg') +
                                      createSlider('물체 2 질량', 'm2', 1, 10, 5, 1, 'kg') +
                                      `
                                      <div class="mt-2">
                                          <label class="block text-sm font-medium text-gray-700 mb-1">충돌 유형</label>
                                          <select id="restitution" class="w-full border-gray-300 rounded-md shadow-sm p-2 bg-gray-50" onchange="resetSimulation()">
                                              <option value="1">완전 탄성 충돌</option>
                                              <option value="0">완전 비탄성 충돌</option>
                                          </select>
                                      </div>`;
            } else if (id === 'thermal') {
                container.innerHTML = createSlider('온도 (운동 에너지)', 'temp', 1, 10, 3, 0.1, '');
            } else if (id === 'gravity') {
                container.innerHTML = createSlider('중심 행성 질량', 'g_mass', 10, 100, 50, 5, 'M') +
                                      createSlider('궤도 반지름', 'g_radius', 50, 250, 150, 10, 'km');
            } else if (id === 'freefall') {
                container.innerHTML = createSlider('물체 1 질량', 'f_m1', 1, 100, 10, 1, 'kg') +
                                      createSlider('물체 2 질량', 'f_m2', 1, 100, 50, 1, 'kg');
            } else if (id === 'impulse') {
                container.innerHTML = `
                    <div class="mt-2">
                        <label class="block text-sm font-medium text-gray-700 mb-1">에어백 상태</label>
                        <select id="airbag" class="w-full border-gray-300 rounded-md shadow-sm p-2 bg-gray-50" onchange="resetSimulation()">
                            <option value="on">에어백 ON (충돌 시간 김)</option>
                            <option value="off">에어백 OFF (충돌 시간 짧음)</option>
                        </select>
                    </div>`;
            }
        }

        // --- 5. 상태 업데이트 및 초기화 ---
        function getVal(id) {
            return parseFloat(document.getElementById(id).value);
        }

        function updateState() {
            if (!currentSim) return;
            if (currentSim === 'circuit') {
                state.v = getVal('voltage');
                state.r = getVal('resistance');
                state.current = state.v / state.r;
            } else if (currentSim === 'thermal') {
                const temp = getVal('temp');
                state.particles.forEach(p => {
                    const speed = Math.sqrt(p.vx*p.vx + p.vy*p.vy);
                    p.vx = (p.vx / speed) * temp;
                    p.vy = (p.vy / speed) * temp;
                });
            }
        }

        function resetSimulation() {
            const w = canvas.width;
            const h = canvas.height;
            state = { time: 0 };
            
            if (currentSim === 'energy') {
                state.angle0 = getVal('angle') * Math.PI / 180;
                state.len = getVal('length');
                state.g = 9.8;
            } else if (currentSim === 'circuit') {
                updateState();
            } else if (currentSim === 'electric_field') {
                // UI에서 즉시 반영되므로 초기화 불필요
            } else if (currentSim === 'momentum') {
                state.m1 = getVal('m1');
                state.m2 = getVal('m2');
                state.rest = parseFloat(document.getElementById('restitution').value);
                state.x1 = 50; state.v1 = 4;
                state.x2 = w - 100; state.v2 = -2;
                state.collided = false;
            } else if (currentSim === 'thermal') {
                state.particles = [];
                const temp = getVal('temp');
                for(let i=0; i<50; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    state.particles.push({
                        x: 50 + Math.random() * (w - 100),
                        y: 50 + Math.random() * (h - 100),
                        vx: Math.cos(angle) * temp,
                        vy: Math.sin(angle) * temp
                    });
                }
            } else if (currentSim === 'gravity') {
                state.angle = 0;
            } else if (currentSim === 'freefall') {
                state.y1 = 50; state.y2 = 50;
                state.v1 = 0; state.v2 = 0;
            } else if (currentSim === 'impulse') {
                state.carX = 50;
                state.v = 5;
                state.hit = false;
                state.forceData = [];
                state.airbag = document.getElementById('airbag').value;
            }
        }

        function togglePlay() {
            isPlaying = !isPlaying;
            document.getElementById('btn-toggle').innerText = isPlaying ? "일시정지" : "재생";
        }

        // --- 6. 드로잉 및 물리 엔진 (애니메이션 루프) ---
        function drawGrid() {
            ctx.strokeStyle = '#e5e7eb';
            ctx.lineWidth = 1;
            for (let i = 0; i < canvas.width; i += 50) {
                ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(canvas.width, i); ctx.stroke();
            }
        }

        function animate() {
            if (!currentSim) return;
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawGrid();

            if (isPlaying) {
                state.time += 0.05;
            }

            const w = canvas.width;
            const h = canvas.height;

            switch (currentSim) {
                case 'energy':
                    // 진자 물리 계산
                    const angle = state.angle0 * Math.cos(Math.sqrt(state.g / state.len) * state.time * 5);
                    const pivotX = w / 2;
                    const pivotY = 50;
                    const bobX = pivotX + state.len * Math.sin(angle);
                    const bobY = pivotY + state.len * Math.cos(angle);
                    
                    // 선
                    ctx.beginPath();
                    ctx.moveTo(pivotX, pivotY);
                    ctx.lineTo(bobX, bobY);
                    ctx.strokeStyle = '#374151';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                    // 추
                    ctx.beginPath();
                    ctx.arc(bobX, bobY, 20, 0, Math.PI * 2);
                    ctx.fillStyle = '#4f46e5';
                    ctx.fill();
                    
                    // 에너지 그래프
                    const maxPE = 100;
                    const h_height = state.len - state.len * Math.cos(angle);
                    const max_h = state.len - state.len * Math.cos(state.angle0);
                    const pe = (h_height / max_h) * maxPE;
                    const ke = maxPE - pe;
                    
                    ctx.fillStyle = 'black'; ctx.font = '14px Noto Sans KR';
                    ctx.fillText('위치 에너지 (PE)', 20, 30);
                    ctx.fillStyle = '#10b981'; ctx.fillRect(150, 18, pe, 15);
                    ctx.fillStyle = 'black';
                    ctx.fillText('운동 에너지 (KE)', 20, 55);
                    ctx.fillStyle = '#ef4444'; ctx.fillRect(150, 43, ke, 15);
                    break;

                case 'circuit':
                    // 회로도 그리기
                    ctx.strokeStyle = '#000'; ctx.lineWidth = 3;
                    ctx.strokeRect(150, 100, 300, 150);
                    
                    // 배터리 기호
                    ctx.fillStyle = '#fff'; ctx.fillRect(130, 150, 40, 50);
                    ctx.beginPath(); ctx.moveTo(140, 150); ctx.lineTo(140, 200); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(160, 165); ctx.lineTo(160, 185); ctx.lineWidth=5; ctx.stroke();
                    ctx.fillStyle = 'black'; ctx.fillText(`${state.v}V`, 100, 180);
                    
                    // 저항 기호
                    ctx.fillStyle = '#fff'; ctx.fillRect(250, 230, 100, 40);
                    ctx.beginPath(); ctx.moveTo(250, 250); ctx.lineTo(260, 235); ctx.lineTo(280, 265); ctx.lineTo(300, 235); ctx.lineTo(320, 265); ctx.lineTo(340, 235); ctx.lineTo(350, 250); ctx.lineWidth=2; ctx.stroke();
                    ctx.fillText(`${state.r}Ω`, 290, 290);
                    
                    // 전구 (밝기는 전류의 제곱에 비례 P=I^2R, 단순화)
                    const power = state.v * state.current;
                    const brightness = Math.min(1, power / 100);
                    ctx.fillStyle = '#fff'; ctx.fillRect(280, 80, 40, 40);
                    ctx.beginPath(); ctx.arc(300, 100, 30, 0, Math.PI*2);
                    ctx.fillStyle = `rgba(253, 224, 71, ${brightness})`;
                    ctx.fill(); ctx.stroke();
                    ctx.fillStyle = 'black'; ctx.fillText('전구', 285, 60);

                    // 정보
                    ctx.font = '16px bold Noto Sans KR';
                    ctx.fillText(`전류 (I = V/R): ${state.current.toFixed(2)} A`, 20, 350);
                    break;

                case 'electric_field':
                    const q1 = getVal('q1');
                    const q2 = getVal('q2');
                    const dist = getVal('dist');
                    const centerX = w / 2;
                    const cY = h / 2;
                    const x1 = centerX - dist/2;
                    const x2 = centerX + dist/2;
                    
                    // 전하 1
                    ctx.beginPath(); ctx.arc(x1, cY, Math.abs(q1)*2 + 10, 0, Math.PI*2);
                    ctx.fillStyle = q1 > 0 ? '#ef4444' : (q1 < 0 ? '#3b82f6' : '#9ca3af'); ctx.fill();
                    ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.fillText(q1>0?'+':(q1<0?'-':'0'), x1, cY+5);
                    
                    // 전하 2
                    ctx.beginPath(); ctx.arc(x2, cY, Math.abs(q2)*2 + 10, 0, Math.PI*2);
                    ctx.fillStyle = q2 > 0 ? '#ef4444' : (q2 < 0 ? '#3b82f6' : '#9ca3af'); ctx.fill();
                    ctx.fillStyle = '#fff'; ctx.fillText(q2>0?'+':(q2<0?'-':'0'), x2, cY+5);
                    
                    // 힘 화살표
                    ctx.textAlign = 'left'; ctx.fillStyle='black';
                    if (q1 !== 0 && q2 !== 0) {
                        const force = (q1 * q2) / (dist * dist) * 10000; // 시각적 스케일링
                        const isAttract = (q1 * q2) < 0;
                        
                        ctx.beginPath(); ctx.strokeStyle = 'black'; ctx.lineWidth = 2;
                        // q1 화살표
                        const fLen = Math.min(Math.abs(force), 100);
                        const dir1 = isAttract ? 1 : -1;
                        ctx.moveTo(x1 + (q1>0?20:-20)*dir1, cY); ctx.lineTo(x1 + (fLen+20)*dir1, cY);
                        // 화살촉 생략 (심플하게 선으로 표시)
                        ctx.stroke();
                        
                        // q2 화살표
                        const dir2 = isAttract ? -1 : 1;
                        ctx.beginPath();
                        ctx.moveTo(x2 + (q2>0?20:-20)*dir2, cY); ctx.lineTo(x2 + (fLen+20)*dir2, cY);
                        ctx.stroke();

                        ctx.fillText(`힘의 방향: ${isAttract ? '인력 (당김)' : '척력 (밀어냄)'}`, 20, 30);
                        ctx.fillText(`힘의 상대적 크기: ${Math.abs(force).toFixed(2)}`, 20, 50);
                    }
                    break;

                case 'momentum':
                    if (isPlaying) {
                        state.x1 += state.v1;
                        state.x2 += state.v2;
                        
                        // 충돌 판정
                        if (!state.collided && (state.x1 + 40 >= state.x2)) {
                            state.collided = true;
                            // 1차원 충돌 공식
                            const m1 = state.m1; const m2 = state.m2;
                            const u1 = state.v1; const u2 = state.v2;
                            const e = state.rest; // 반발 계수
                            
                            state.v1 = ((m1 - e*m2)*u1 + (1+e)*m2*u2) / (m1 + m2);
                            state.v2 = ((m2 - e*m1)*u2 + (1+e)*m1*u1) / (m1 + m2);
                        }
                        
                        // 벽 튕김 (리셋)
                        if (state.x1 < 0 || state.x2 > w-40) resetSimulation();
                    }

                    // 물체 1
                    ctx.fillStyle = '#ef4444'; ctx.fillRect(state.x1, h/2 - 20, 40, 40);
                    ctx.fillStyle = 'white'; ctx.fillText(state.m1+'kg', state.x1+5, h/2+5);
                    // 물체 2
                    ctx.fillStyle = '#3b82f6'; ctx.fillRect(state.x2, h/2 - 20, 40, 40);
                    ctx.fillStyle = 'white'; ctx.fillText(state.m2+'kg', state.x2+5, h/2+5);
                    
                    ctx.fillStyle = 'black';
                    ctx.fillText(`충돌 전/후 운동량 계산`, 20, 30);
                    const p1 = state.m1 * state.v1;
                    const p2 = state.m2 * state.v2;
                    ctx.fillText(`총 운동량: ${(p1+p2).toFixed(2)} kg·m/s`, 20, 50);
                    break;

                case 'thermal':
                    if (isPlaying) {
                        state.particles.forEach(p => {
                            p.x += p.vx; p.y += p.vy;
                            if (p.x < 10 || p.x > w-10) p.vx *= -1;
                            if (p.y < 10 || p.y > h-10) p.vy *= -1;
                        });
                    }
                    ctx.fillStyle = '#ef4444';
                    state.particles.forEach(p => {
                        ctx.beginPath(); ctx.arc(p.x, p.y, 5, 0, Math.PI*2); ctx.fill();
                    });
                    
                    // 온도계 UI
                    const tempVal = getVal('temp');
                    ctx.fillStyle = '#e5e7eb'; ctx.fillRect(w-40, h-120, 20, 100);
                    ctx.fillStyle = '#ef4444'; ctx.fillRect(w-40, h-20 - tempVal*10, 20, tempVal*10);
                    ctx.fillStyle = 'black'; ctx.fillText('온도', w-45, h-130);
                    break;

                case 'gravity':
                    const gMass = getVal('g_mass');
                    const r = getVal('g_radius');
                    
                    if (isPlaying) {
                        // 케플러 제3법칙 적용 (각속도 w = sqrt(GM/r^3))
                        const G = 0.5; // 시각적 비례상수
                        const omega = Math.sqrt((G * gMass) / Math.pow(r, 3));
                        state.angle += omega * 10; 
                    }

                    // 중심 행성
                    ctx.beginPath(); ctx.arc(w/2, h/2, Math.sqrt(gMass)*3, 0, Math.PI*2);
                    ctx.fillStyle = '#f59e0b'; ctx.fill();
                    
                    // 궤도
                    ctx.beginPath(); ctx.arc(w/2, h/2, r, 0, Math.PI*2);
                    ctx.strokeStyle = '#d1d5db'; ctx.setLineDash([5, 5]); ctx.stroke();
                    ctx.setLineDash([]);

                    // 위성
                    const satX = w/2 + r * Math.cos(state.angle);
                    const satY = h/2 + r * Math.sin(state.angle);
                    ctx.beginPath(); ctx.arc(satX, satY, 8, 0, Math.PI*2);
                    ctx.fillStyle = '#3b82f6'; ctx.fill();
                    
                    ctx.fillStyle = 'black';
                    ctx.fillText('구심력과 만유인력이 평형을 이루어 궤도 운동을 합니다.', 20, 30);
                    break;

                case 'freefall':
                    if (isPlaying) {
                        state.v1 += 0.2; // g
                        state.v2 += 0.2; // g
                        state.y1 += state.v1;
                        state.y2 += state.v2;
                        
                        if (state.y1 > h - 30) { state.y1 = h-30; state.v1 = 0; }
                        if (state.y2 > h - 30) { state.y2 = h-30; state.v2 = 0; }
                    }

                    const size1 = Math.sqrt(getVal('f_m1')) * 3;
                    const size2 = Math.sqrt(getVal('f_m2')) * 3;

                    ctx.fillStyle = '#ef4444'; ctx.beginPath(); ctx.arc(w/3, state.y1, size1, 0, Math.PI*2); ctx.fill();
                    ctx.fillStyle = '#3b82f6'; ctx.beginPath(); ctx.arc((w/3)*2, state.y2, size2, 0, Math.PI*2); ctx.fill();

                    ctx.fillStyle = 'black'; ctx.textAlign='center';
                    ctx.fillText('공기 저항이 없을 때 질량에 관계없이 낙하 속도는 동일합니다.', w/2, 30);
                    // 바닥
                    ctx.fillRect(0, h-30 + Math.max(size1, size2), w, 10);
                    break;

                case 'impulse':
                    // 에어백 시뮬레이션
                    const wallX = w - 100;
                    
                    if (isPlaying && !state.hit) {
                        state.carX += state.v;
                        if (state.carX > wallX - 40) {
                            state.hit = true;
                            state.hitTime = state.time;
                        }
                    }

                    // 충격량 그래프 데이터 수집
                    if (state.hit && state.time - state.hitTime < 5) {
                        const t = state.time - state.hitTime;
                        let force = 0;
                        if (state.airbag === 'on') {
                            // 에어백 ON: 시간이 길고 힘이 작음 (사인 곡선)
                            if (t < 4) force = Math.sin((t/4)*Math.PI) * 40;
                        } else {
                            // 에어백 OFF: 시간이 짧고 힘이 큼
                            if (t < 1) force = Math.sin((t/1)*Math.PI) * 120;
                        }
                        state.forceData.push({t: state.time, f: force});
                    }

                    // 차 그리기
                    ctx.fillStyle = '#3b82f6'; ctx.fillRect(state.carX, h/2, 40, 20);
                    ctx.fillStyle = 'black'; ctx.beginPath(); ctx.arc(state.carX+10, h/2+20, 5, 0, Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(state.carX+30, h/2+20, 5, 0, Math.PI*2); ctx.fill();
                    // 벽
                    ctx.fillStyle = '#9ca3af'; ctx.fillRect(wallX, h/2-20, 20, 60);

                    // 에어백 시각화
                    if (state.hit && state.airbag === 'on' && state.time - state.hitTime < 4) {
                        ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
                        ctx.beginPath(); ctx.arc(state.carX+40, h/2+10, 15, 0, Math.PI*2); ctx.fill(); ctx.stroke();
                    }

                    // 그래프 그리기 (하단)
                    ctx.strokeRect(50, h-100, w-100, 80);
                    ctx.fillStyle = 'black'; ctx.textAlign='left'; ctx.fillText('힘 (Force)', 10, h-60);
                    ctx.fillText('시간 (Time)', w/2, h-5);
                    
                    ctx.beginPath();
                    ctx.strokeStyle = '#ef4444'; ctx.lineWidth=2;
                    for(let i=0; i<state.forceData.length; i++) {
                        const d = state.forceData[i];
                        const px = 50 + i*2;
                        const py = h-20 - d.f;
                        if(i===0) ctx.moveTo(px, py);
                        else ctx.lineTo(px, py);
                    }
                    ctx.stroke();
                    break;
            }

            animationId = requestAnimationFrame(animate);
        }

        // 초기화
        initApp();
    </script>
</body>
</html>
